name: 📚 Docs

on:
  pull_request:
    paths:
      - docs/**
      - src/**
      - scripts/generate-docs.ts
      - package.json
      - pnpm-lock.yaml
  push:
    branches: [main]
    paths:
      - docs/**
      - src/**
      - scripts/generate-docs.ts
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: read

jobs:
  build:
    name: ▲ Vercel-ready docs build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧾 Generate docs
        run: pnpm docs:generate

      - name: 🏗️ Build static docs
        run: pnpm docs:build
